spring.application.name=Smart Parking System

# Server Configuration
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:smartparking
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=ashish
spring.datasource.password=password

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.boot.scan.packages=com.smartparking.entity

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.com.smartparking=DEBUG
logging.level.org.springframework.boot.autoconfigure.h2=DEBUG
logging.level.org.springframework.boot.autoconfigure.web.servlet=DEBUG
